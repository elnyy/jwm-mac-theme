<!DOCTYPE html>
<html>
	<head>
		<title>
			JWMのウィンドウボタンをmacOS風に
		</title>
	</head>

	<body>
		<h1>JWMのウィンドウボタンをmacOS風に</h1>
		<img src="./example.png"/>
		<p>
		<a href="github.com/elnyy/jwm-mac-theme">このリポジトリ</a>にあるassetsフォルダの中のsvgファイルをダウンロードし、.jwmrcに以下を追記する
		<br>
		<code>
		<ButtonMax>/path/to/max.svg</ButtonMax>
        <ButtonMaxActive>/path/to/max.svg</ButtonMaxActive>
        <ButtonMin>/path/to/min.svg</ButtonMin>
		</code>
	</body>
</html>
